<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Building Live Dashboard</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f4f7f6;
      color: #333;
      text-align: center;
      padding: 20px;
    }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 40px auto;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card h3 {
      margin: 0;
      color: #7f8c8d;
      font-size: 1.2rem;
    }
    .card .value {
      font-size: 2.5rem;
      font-weight: bold;
      color: #2c3e50;
      margin: 10px 0;
    }
    .status {
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>🏢 Smart Building Live Dashboard</h1>
  <p class="status">Status: <span id="sync-status">Waiting for data...</span></p>

  <div class="grid-container">
    <div class="card">
      <h3>Temperature</h3>
      <div class="value" id="temp-val">-- °C</div>
    </div>
    
    <div class="card">
      <h3>Humidity</h3>
      <div class="value" id="hum-val">-- %</div>
    </div>

    <div class="card">
      <h3>Motion State</h3>
      <div class="value" id="motion-val">--</div>
    </div>

    <div class="card">
      <h3>Live Power</h3>
      <div class="value" id="power-val">-- W</div>
    </div>
  </div>

<!-- script -->
 <script>
  // Your ThingSpeak API URL
  const apiURL = 'https://api.thingspeak.com/channels/3156321/feeds/last.json?api_key=LF4U9OKXL9D84MU6';

  // Function to fetch data from the cloud
  async function fetchSmartBuildingData() {
    try {
      document.getElementById('sync-status').innerText = 'Syncing...';
      document.getElementById('sync-status').style.color = '#f39c12';

      // 1. Fetch the JSON data from ThingSpeak
      const response = await fetch(apiURL);
      const data = await response.json();

      // 2. Extract the values from the JSON fields
      const temperature = data.field1;
      const humidity = data.field2;
      const motion = data.field3;
      const power = data.field5; // Assuming Power is field 5

      // 3. Update the HTML elements with the new data
      document.getElementById('temp-val').innerText = parseFloat(temperature).toFixed(1) + ' °C';
      document.getElementById('hum-val').innerText = parseFloat(humidity).toFixed(1) + ' %';
      
      // Change motion from 1/0 to Yes/No
      if (motion == '1') {
        document.getElementById('motion-val').innerText = 'Detected 🚶';
        document.getElementById('motion-val').style.color = '#27ae60'; // Green
      } else {
        document.getElementById('motion-val').innerText = 'Empty 🛑';
        document.getElementById('motion-val').style.color = '#c0392b'; // Red
      }

      document.getElementById('power-val').innerText = parseFloat(power).toFixed(2) + ' W';

      // Update sync status
      document.getElementById('sync-status').innerText = 'Live 🟢 (Last update: ' + new Date().toLocaleTimeString() + ')';
      document.getElementById('sync-status').style.color = '#27ae60';

    } catch (error) {
      console.error('Error fetching data:', error);
      document.getElementById('sync-status').innerText = 'Connection Lost 🔴';
      document.getElementById('sync-status').style.color = '#c0392b';
    }
  }

  // 4. Run the function immediately when the page loads
  fetchSmartBuildingData();

  // 5. Set it to automatically run every 16 seconds (16000 milliseconds)
  setInterval(fetchSmartBuildingData, 16000);

</script>

  </body>
</html>
